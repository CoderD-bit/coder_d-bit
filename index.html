<!DOCTYPE html>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  background: radial-gradient(circle at center, #1e1e1e, #121212);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  margin:0;
}

h1 {
  font-family:'Pacifico';
  font-size:3rem;
}

.top-controls {
  margin:15px 0;
}

.top-controls input {
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  width:160px;
  text-align:center;
}

.top-controls button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
  font-weight:bold;
  background:#00ff99;
}

.board {
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
}

.cell {
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.5rem;
  cursor:pointer;
  border-radius:10px;
}

.cell.X { color:#ffd700; }
.cell.O { color:#00ff99; }

#status {
  margin-top:15px;
}

/* POPUP */
.popup {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup.show { display:flex; }

.popup-box {
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.popup-box input {
  padding:10px;
  margin:10px;
  border:none;
  border-radius:5px;
  text-align:center;
}

.popup-box button {
  padding:10px 20px;
  background:#00ff99;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="top-controls">
  <input id="roomId" placeholder="Room ID">
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="status">Create or Join Room</div>

<div class="board" id="board"></div>

<!-- NAME POPUP -->
<div class="popup" id="namePopup">
  <div class="popup-box">
    <h3>Enter Names</h3>
    <input id="nameX" placeholder="Player X"><br>
    <input id="nameO" placeholder="Player O"><br>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- WIN POPUP -->
<div class="popup" id="winPopup">
  <div class="popup-box">
    <h2 id="popupMessage"></h2>
    <button onclick="closePopup()">Next</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDdqkaRX5-PvcF3CZ90Zvq8NNOo6zT17SE",
  authDomain: "tic-tac-toe-0258.firebaseapp.com",
  databaseURL: "https://tic-tac-toe-0258-default-rtdb.firebaseio.com",
  projectId: "tic-tac-toe-0258",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();


  
// 🎮 Variables
let roomId = "";
let playerSymbol = "";
let boardState = ["","","","","","","","",""];
let currentPlayer = "X";
let cells = [];

let playerXName="X";
let playerOName="O";

// 🏠 CREATE ROOM
function createRoom(){
  roomId = Math.random().toString(36).substr(2,5);
  document.getElementById("roomId").value = roomId;

  playerSymbol="X";

  db.ref("rooms/"+roomId).set({
    board: ["","","","","","","","",""],
    turn: "X",
    winner: "",
    playerX: true,
    playerO: false,
    playerXName: "",
    playerOName: ""
  });

  alert("Room ID: "+roomId);

  document.getElementById("namePopup").classList.add("show");

  // Disable O input
  document.getElementById("nameO").disabled = true;
}

  
// 🔗 JOIN ROOM
function joinRoom(){
  roomId = document.getElementById("roomId").value;

  if(!roomId){
    alert("Enter Room ID");
    return;
  }

  db.ref("rooms/"+roomId).once("value", snap=>{
    const data = snap.val();

    if(!data){
      alert("Room not found");
      return;
    }

    if(!data.playerO){
      playerSymbol="O";

      db.ref("rooms/"+roomId).update({
        playerO: true
      });

      document.getElementById("namePopup").classList.add("show");

      // Disable X input
      document.getElementById("nameX").disabled = true;

    } else {
      alert("Room Full ❌");
    }
  });
}

  

// 🚀 START GAME
function startGame(){

  // Disable button (prevent double click)
  document.querySelector(".popup-box button").disabled = true;

  if(playerSymbol==="X"){

    db.ref("rooms/"+roomId+"/playerXName").transaction(current=>{
      if(current === ""){
        return document.getElementById("nameX").value || "X";
      }
      return; // already set → do nothing
    });

  } else if(playerSymbol==="O"){

    db.ref("rooms/"+roomId+"/playerOName").transaction(current=>{
      if(current === ""){
        return document.getElementById("nameO").value || "O";
      }
      return;
    });

  }

  document.getElementById("namePopup").classList.remove("show");

  listenGame();
}

  

// 👂 LISTEN
function listenGame(){
  db.ref("rooms/"+roomId).on("value", snap=>{
    const data = snap.val();
    if(!data) return;

    boardState = data.board;
    currentPlayer = data.turn;

    if(data.playerXName) playerXName=data.playerXName;
    if(data.playerOName) playerOName=data.playerOName;

    if(playerXName){
  document.getElementById("nameX").disabled = true;
}
if(playerOName){
  document.getElementById("nameO").disabled = true;
}
    
    updateUI();

    if(data.winner){
      showWin(data.winner);
    }
  });
}

// 🎯 CLICK
function handleClick(e){
  const index = cells.indexOf(e.target);

  if(boardState[index] || currentPlayer!==playerSymbol) return;

  boardState[index]=playerSymbol;

  const winner = checkWin(boardState);

  db.ref("rooms/"+roomId).update({
    board: boardState,
    turn: playerSymbol==="X"?"O":"X",
    winner: winner || ""
  });
}

// 🎨 UI
function updateUI(){
  cells.forEach((c,i)=>{
    c.textContent = boardState[i];
    c.className="cell "+boardState[i];
  });

  document.getElementById("status").textContent =
    (currentPlayer==="X"?playerXName:playerOName)+" Turn";
}

// 🏆 WIN
// SECOND ONE ✅
function showWin(w){
  document.getElementById("popupMessage").textContent =
    (w==="X"?playerXName:playerOName)+" Wins!";

  document.getElementById("winPopup").classList.add("show");

  celebrateWin();
}

// 🔄 RESET
function closePopup(){
  document.getElementById("winPopup").classList.remove("show");

  boardState=["","","","","","","","",""];

  db.ref("rooms/"+roomId).update({
    board: boardState,
    winner: ""
  });
}

// 🧠 CHECK WIN
function checkWin(b){
  const c=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let i of c){
    if(b[i[0]] && b[i[0]]===b[i[1]] && b[i[1]]===b[i[2]]) return b[i[0]];
  }
}

// 🔲 INIT
function init(){
  const board=document.getElementById("board");
  for(let i=0;i<9;i++){
    const d=document.createElement("div");
    d.className="cell";
    d.onclick=handleClick;
    board.appendChild(d);
    cells.push(d);
  }
}
init();

function celebrateWin() {
  const duration = 2000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 55,
      origin: { x: 0 }
    });

    confetti({
      particleCount: 5,
      angle: 120,
      spread: 55,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}
 
</script>

</body>
</html>
