<!DOCTYPE html>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at center, #1e1e1e, #121212);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      margin-bottom: 10px;
      color: #fefefe;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
    }

    .round-info {
      margin-bottom: 10px;
      font-size: 1.1rem;
      color: #bbb;
    }

    .scoreboard {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background-color: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      cursor: pointer;
      border-radius: 10px;
      transition: background-color 0.3s;
    }

    .cell:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .cell.X {
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700, 0 0 20px #ffcc00;
    }

    .cell.O {
      color: #00ff99;
      text-shadow: 0 0 10px #00ff99, 0 0 20px #00cc77;
    }

    #status {
      margin-top: 20px;
      font-size: 1.2rem;
    }

   .popup,
.name-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 10, 0.3);  /* updated for translucent effect */
  backdrop-filter: blur(10px);        /* added for blur */
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.popup.show,
.name-popup.show {
  opacity: 1;
  pointer-events: all;
}

.popup-content,
.name-popup-content {
  background: rgba(255, 255, 255, 0.05);  /* updated to translucent */
  border: 1px solid rgba(255, 255, 255, 0.2); /* optional subtle border */
  backdrop-filter: blur(25px);               /* blur on the popup box */
  -webkit-backdrop-filter: blur(25px);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  animation: popupIn 0.4s ease forwards;
  color: #fff;
}

@keyframes popupIn {
  from {
    transform: scale(0.7);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

.popup-content button,
.name-popup-content button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #00ff99;
  border: none;
  border-radius: 5px;
  font-size: 1rem;
  cursor: pointer;
  color: #000;
  font-weight: bold;
}

.name-popup-content input {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 10px;
  font-size: 1rem;
  border: none;
  border-radius: 5px;
  text-align: center;
}

    #winPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 10, 0.3); /* dark translucent */
  backdrop-filter: blur(10px);       /* blur the background */
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#winPopup.show {
  display: flex;
}

#winPopup .popup-content {
  background: rgba(255, 255, 255, 0.05); /* translucent glass effect */
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 16px;
  padding: 40px 60px;
  text-align: center;
  color: #ffffff;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
  transition: all 0.3s ease-in-out;
}

#winPopup .popup-content button {
  margin-top: 20px;
  background: rgba(255, 255, 255, 0.8);
  color: #000;
  border: none;
  padding: 12px 24px;
  font-weight: bold;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.3s ease;
}

#winPopup .popup-content button:hover {
  background: #fff;
}

  </style>
</head>

<body>
  <h1>Tic Tac Toe</h1>
  <div class="round-info" id="roundDisplay">Round: 1</div>
  <div class="scoreboard" id="scoreboard">Score — X: 0 | O: 0</div>
  <div style="margin-bottom: 20px;">
  <input type="text" id="roomId" placeholder="Enter Room ID" />
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
</div>
  <div class="board" id="board"></div>
  <div id="status">Loading...</div>

   <!-- Win Popup -->
  <div class="popup" id="winPopup">
    <div class="popup-content">
      <h2 id="popupMessage"></h2>
      <button onclick="closePopup()">Continue</button>
    </div>
  </div>
  <!-- Name & Round Entry Popup -->
  <div class="name-popup show" id="namePopup">
    <div class="name-popup-content">
      <h2>Enter Player Names</h2>
      <input type="text" id="nameX" placeholder="Player X Name" />
      <input type="text" id="nameO" placeholder="Player O Name" />
      <input type="number" id="roundsInput" placeholder="How many rounds?" min="1" />
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

<script>
  
let scoreX = 0;
let scoreO = 0;
let playerXName = "Player X";
let playerOName = "Player O";
let currentPlayer = "X";

// 🔥 Firebase Config FIRST
const firebaseConfig = {
  apiKey: "AIzaSyDdqkaRX5-PvcF3CZ90Zvq8NNOo6zT17SE",
  authDomain: "tic-tac-toe-0258.firebaseapp.com",
  databaseURL: "https://tic-tac-toe-0258-default-rtdb.firebaseio.com",
  projectId: "tic-tac-toe-0258",
  storageBucket: "tic-tac-toe-0258.firebasestorage.app",
  messagingSenderId: "824935415336",
  appId: "1:824935415336:web:999914ee6c5e882655bf1d"
};

// ✅ THEN initialize
firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🎮 Game Variables
let roomId = "";
let playerSymbol = "";
let boardState = ["", "", "", "", "", "", "", "", ""];

// 🏠 Create Room
function createRoom() {
  roomId = Math.random().toString(36).substring(2, 7);
  document.getElementById("roomId").value = roomId;

  playerSymbol = "X";

  db.ref("rooms/" + roomId).set({
  board: boardState,
  turn: "X"
});

  function listenGame() {
  db.ref("rooms/" + roomId).on("value", (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    boardState = data.board;
    currentPlayer = data.turn;

    updateBoardUI();

    // 🔥 UPDATE STATUS TEXT
    const currentName = currentPlayer === "X" ? playerXName : playerOName;
    document.getElementById("status").textContent = `${currentName}'s Turn (${currentPlayer})`;

    // 🔥 WIN POPUP
    if (data.winner) {
      showWinPopup(data.winner);
    } else if (boardState.every(cell => cell)) {
      showDrawPopup();
    }
  });
}

  function showWinPopup(winner) {
  const popup = document.getElementById("winPopup");
  const message = document.getElementById("popupMessage");

  const winnerName = winner === "X" ? playerXName : playerOName;

  message.textContent = `🎉 ${winnerName} wins this round!`;
  popup.classList.add("show");

  if (winner === "X") scoreX++;
  else scoreO++;

  updateScoreboard();
}

function showDrawPopup() {
  const popup = document.getElementById("winPopup");
  const message = document.getElementById("popupMessage");

  message.textContent = "🤝 It's a draw!";
  popup.classList.add("show");
}


  function updateScoreboard() {
  document.getElementById("scoreboard").textContent =
    `Score — ${playerXName}: ${scoreX} | ${playerOName}: ${scoreO}`;
}

  function closePopup() {
  document.getElementById("winPopup").classList.remove("show");

  // reset board only
  boardState = ["","","","","","","","",""];

  db.ref("rooms/" + roomId).update({
    board: boardState,
    winner: ""
  });
}
// 🔗 Join Room
function joinRoom() {
  roomId = document.getElementById("roomId").value;
  playerSymbol = "O";
  listenGame();
}

// 👂 Listen for changes
function listenGame() {
  db.ref("rooms/" + roomId).on("value", (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    boardState = data.board;
    currentPlayer = data.turn;

    updateBoardUI();
  });
}

// 🎯 Handle Click
function handleClick(e) {
  const index = cells.indexOf(e.target);

  if (boardState[index] || currentPlayer !== playerSymbol) return;

  boardState[index] = playerSymbol;

  const winner = checkWin(boardState);

  db.ref("rooms/" + roomId).update({
    board: boardState,
    turn: playerSymbol === "X" ? "O" : "X",
    winner: winner || ""
  });
}

// 🎨 Update UI
function updateBoardUI() {
  cells.forEach((cell, i) => {
    cell.textContent = boardState[i];
    cell.classList.remove("X", "O");

    if (boardState[i]) {
      cell.classList.add(boardState[i]);
    }
  });
}

  let cells = [];

function init() {
  const board = document.getElementById('board');

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.classList.add('cell');
    cell.addEventListener('click', handleClick);
    board.appendChild(cell);
    cells.push(cell);
  }
}

init();

  function startGame() {
  const nameX = document.getElementById('nameX').value.trim();
  const nameO = document.getElementById('nameO').value.trim();

  if (nameX) playerXName = nameX;
  if (nameO) playerOName = nameO;

  document.getElementById('namePopup').classList.remove('show');
  document.getElementById('status').textContent = `${playerXName}'s Turn (X)`;
}

  function checkWin(board) {
  const combos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let combo of combos) {
    const [a,b,c] = combo;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      return board[a];
    }
  }
  return null;
}
</script>

</body>

</html>
