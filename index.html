<!DOCTYPE html>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>

<style>
body {
  background: #121212;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 100px;
  height: 100px;
  background: #222;
  font-size: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.popup {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup.show {
  display:flex;
}

.popup-box {
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
}

/* 🔲 Room Controls Container */
.room-controls {
  margin-top: 20px;
}

/* 🔤 Room ID Input */
#roomId {
  padding: 12px 15px;
  width: 180px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #1e1e1e;
  color: #fff;
  outline: none;
  font-size: 14px;
  margin-right: 10px;
  transition: 0.3s;
}

#roomId::placeholder {
  color: #aaa;
}

#roomId:focus {
  border-color: #00ff99;
  box-shadow: 0 0 8px #00ff99;
}

/* 🔘 Buttons */
.room-btn {
  padding: 12px 18px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #00ff99, #00cc77);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
  transition: all 0.3s ease;
}

/* Hover effect */
.room-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,255,153,0.3);
}

/* Click effect */
.room-btn:active {
  transform: scale(0.95);
}

/* Secondary button (Join) */
.join-btn {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="room-controls">
  <input id="roomId" placeholder="Enter Room ID">
  <br><br>
  <button class="room-btn" onclick="createRoom()">Create Room</button>
  <button class="room-btn join-btn" onclick="joinRoom()">Join Room</button>
</div>
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<div id="status"></div>

<div class="board" id="board"></div>

<!-- NAME POPUP -->
<div class="popup" id="namePopup">
  <div class="popup-box">
    <h3>Enter Names</h3>
    <input id="nameX" placeholder="Player X"><br><br>
    <input id="nameO" placeholder="Player O"><br><br>
    <button onclick="startGame()">Start</button>
  </div>
</div>

<!-- WIN POPUP -->
<div class="popup" id="winPopup">
  <div class="popup-box">
    <h2 id="popupMessage"></h2>
    <button onclick="closePopup()">Continue</button>
  </div>
</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDdqkaRX5-PvcF3CZ90Zvq8NNOo6zT17SE",
  authDomain: "tic-tac-toe-0258.firebaseapp.com",
  databaseURL: "https://tic-tac-toe-0258-default-rtdb.firebaseio.com",
  projectId: "tic-tac-toe-0258",
  storageBucket: "tic-tac-toe-0258.firebasestorage.app",
  messagingSenderId: "824935415336",
  appId: "1:824935415336:web:999914ee6c5e882655bf1d",
  measurementId: "G-D2ZT9QSJ2Z"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Variables
let roomId = "";
let playerSymbol = "";
let boardState = ["","","","","","","","",""];
let cells = [];
let currentPlayer = "X";
let playerXName = "X";
let playerOName = "O";

// Create Room
function createRoom() {
  roomId = Math.random().toString(36).substr(2,5);
  document.getElementById("roomId").value = roomId;

  playerSymbol = "X";

  db.ref("rooms/"+roomId).set({
    board: boardState,
    turn: "X",
    winner: ""
  });

  alert("Room ID: " + roomId);

  // 👉 SHOW NAME POPUP
  document.getElementById("namePopup").classList.add("show");
}

// Join Room
function joinRoom() {
  roomId = document.getElementById("roomId").value;

  if(!roomId){
    alert("Enter Room ID");
    return;
  }

  playerSymbol = "O";

  // 👉 SHOW NAME POPUP
  document.getElementById("namePopup").classList.add("show");
}

// Start Game
function startGame() {
  const nameX = document.getElementById("nameX").value;
  const nameO = document.getElementById("nameO").value;

  if(!nameX || !nameO){
    alert("Enter both names");
    return;
  }

  playerXName = nameX;
  playerOName = nameO;

  db.ref("rooms/"+roomId).update({
    playerXName,
    playerOName
  });

  document.getElementById("namePopup").classList.remove("show");

  listenGame();
}

// Listen Firebase
function listenGame(){
  db.ref("rooms/"+roomId).on("value", snap=>{
    const data = snap.val();
    if(!data) return;

    boardState = data.board;
    currentPlayer = data.turn;

    if(data.playerXName) playerXName = data.playerXName;
    if(data.playerOName) playerOName = data.playerOName;

    updateUI();

    if(data.winner){
      showWin(data.winner);
    }
  });
}

// Click
function handleClick(e){
  const index = cells.indexOf(e.target);

  if(boardState[index] || currentPlayer !== playerSymbol) return;

  boardState[index] = playerSymbol;

  const winner = checkWin(boardState);

  db.ref("rooms/"+roomId).update({
    board: boardState,
    turn: playerSymbol==="X"?"O":"X",
    winner: winner || ""
  });
}

// UI update
function updateUI(){
  cells.forEach((c,i)=>{
    c.textContent = boardState[i];
  });

  document.getElementById("status").textContent =
    (currentPlayer==="X"?playerXName:playerOName)+" Turn";
}

// Win
function showWin(w){
  document.getElementById("popupMessage").textContent =
    (w==="X"?playerXName:playerOName)+" Wins!";
  document.getElementById("winPopup").classList.add("show");
}

// Close popup
function closePopup(){
  document.getElementById("winPopup").classList.remove("show");

  boardState = ["","","","","","","","",""];

  db.ref("rooms/"+roomId).update({
    board: boardState,
    winner: ""
  });
}

// Check win
function checkWin(b){
  const c=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let i of c){
    if(b[i[0]] && b[i[0]]===b[i[1]] && b[i[1]]===b[i[2]]) return b[i[0]];
  }
}

// Init board
function init(){
  const board = document.getElementById("board");
  for(let i=0;i<9;i++){
    const d=document.createElement("div");
    d.className="cell";
    d.onclick=handleClick;
    board.appendChild(d);
    cells.push(d);
  }
}
init();

</script>

</body>
</html>
