<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  background:#121212;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.board {
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.cell {
  width:100px;
  height:100px;
  background:#1e1e1e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<input id="roomId" placeholder="Room ID">
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>
<button onclick="leaveRoom()">Leave</button>

<h3 id="status">Idle</h3>

<div id="board" class="board"></div>

<script>
// 🔥 Firebase
firebase.initializeApp({
  apiKey: "YOUR_KEY",
  databaseURL: "YOUR_DB_URL"
});
const db = firebase.database();

// 🎮 Variables
let roomId="";
let playerSymbol="";
let boardState=["","","","","","","","",""];
let currentPlayer="X";
let cells=[];

let playerXName="";
let playerOName="";

// 🔲 INIT BOARD
function init(){
  const board=document.getElementById("board");
  board.innerHTML="";
  cells=[];
  for(let i=0;i<9;i++){
    const d=document.createElement("div");
    d.className="cell";
    d.onclick=handleClick;
    board.appendChild(d);
    cells.push(d);
  }
}
init();


// 🏠 CREATE ROOM
function createRoom(){
  leaveRoom();

  roomId = Math.random().toString(36).substr(2,5);
  playerSymbol="X";

  db.ref("rooms/"+roomId).set({
    board:["","","","","","","","",""],
    turn:"X",
    playerX:true,
    playerO:false,
    playerXName:"",
    playerOName:"",
    winner:""
  });

  localStorage.setItem("roomId", roomId);
  localStorage.setItem("playerSymbol", playerSymbol);

  document.getElementById("roomId").value = roomId;

  let name = prompt("Enter your name");
  db.ref("rooms/"+roomId+"/playerXName").set(name || "Player X");

  listenGame();
}


// 🔗 JOIN ROOM
function joinRoom(){
  roomId = document.getElementById("roomId").value.trim();

  if(!roomId) return alert("Enter room");

  db.ref("rooms/"+roomId).once("value", snap=>{
    const data = snap.val();

    if(!data) return alert("Room not found");

    if(!data.playerO){
      playerSymbol="O";
      db.ref("rooms/"+roomId+"/playerO").set(true);

      let name = prompt("Enter your name");
      db.ref("rooms/"+roomId+"/playerOName").set(name || "Player O");

    } else {
      return alert("Room full");
    }

    localStorage.setItem("roomId", roomId);
    localStorage.setItem("playerSymbol", playerSymbol);

    listenGame();
  });
}


// 👂 LISTEN
function listenGame(){
  db.ref("rooms/"+roomId).on("value", snap=>{
    const data = snap.val();
    if(!data) return;

    boardState = data.board;
    currentPlayer = data.turn;

    playerXName = data.playerXName || "";
    playerOName = data.playerOName || "";

    updateUI();

    if(data.winner){
      alert((data.winner==="X"?playerXName:playerOName)+" Wins!");
    }
  });
}


// 🎯 CLICK
function handleClick(e){
  const i = cells.indexOf(e.target);

  if(boardState[i] || currentPlayer!==playerSymbol) return;

  boardState[i]=playerSymbol;

  const winner = checkWin(boardState);

  db.ref("rooms/"+roomId).update({
    board: boardState,
    turn: playerSymbol==="X"?"O":"X",
    winner: winner || ""
  });
}


// 🎨 UI
function updateUI(){
  cells.forEach((c,i)=>{
    c.textContent = boardState[i];
  });

  if(!playerXName || !playerOName){
    document.getElementById("status").textContent="Waiting players...";
    return;
  }

  let name = currentPlayer==="X"?playerXName:playerOName;
  document.getElementById("status").textContent = name + " Turn";
}


// 🚪 LEAVE ROOM
function leaveRoom(){

  if(!roomId) return;

  if(playerSymbol==="X"){
    db.ref("rooms/"+roomId+"/playerX").set(false);
    db.ref("rooms/"+roomId+"/playerXName").set("");
  } else {
    db.ref("rooms/"+roomId+"/playerO").set(false);
    db.ref("rooms/"+roomId+"/playerOName").set("");
  }

  // 🧹 DELETE IF EMPTY
  setTimeout(()=>{
    db.ref("rooms/"+roomId).once("value", snap=>{
      const d=snap.val();
      if(d && !d.playerX && !d.playerO){
        db.ref("rooms/"+roomId).remove();
      }
    });
  },500);

  db.ref("rooms/"+roomId).off();

  localStorage.clear();

  roomId="";
  playerSymbol="";
}


// 🧠 WIN CHECK
function checkWin(b){
  const c=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let i of c){
    if(b[i[0]] && b[i[0]]===b[i[1]] && b[i[1]]===b[i[2]])
      return b[i[0]];
  }
}


// 🔄 AUTO REJOIN AFTER REFRESH
window.onload = function(){
  const savedRoom = localStorage.getItem("roomId");
  const savedSymbol = localStorage.getItem("playerSymbol");

  if(savedRoom && savedSymbol){
    roomId = savedRoom;
    playerSymbol = savedSymbol;

    document.getElementById("roomId").value = roomId;

    listenGame();
  }
};

</script>

</body>
</html>
