  const namePath   = "rooms/"+roomId+"/" + (playerSymbol === "X" ? "playerXName" : "playerOName");

  if(playerSymbol==="X"){

    db.ref("rooms/"+roomId+"/playerXName").transaction(current=>{
      if(current === ""){
        return document.getElementById("nameX").value || "X";
      }
      return; // already set → do nothing
    });

  } else if(playerSymbol==="O"){

    db.ref("rooms/"+roomId+"/playerOName").transaction(current=>{

      leaveRoom();
      return;

    // 🚨 AUTO DELETE if both players left
    if(!data.playerX && !data.playerO){
      db.ref("rooms/"+roomId).remove();
      return;

    boardState = data.board;
    currentPlayer = data.turn;

    playerXName = data.playerXName || "";
    playerOName = data.playerOName || "";

    updateUI();

    if(data.winner){
      showWin(data.winner);
    }
  });
}

  if(boardState[index] || currentPlayer!==playerSymbol) return;

  boardState[index]=playerSymbol;

  const winner = checkWin(boardState);

  db.ref("rooms/"+roomId).update({
    board: boardState,
    turn: playerSymbol==="X"?"O":"X",
    winner: winner || ""
  });
}

  cells.forEach((c,i)=>{

    c.className="cell "+boardState[i];

  if(!playerXName || !playerOName){
    document.getElementById("status").textContent = "Waiting for players...";
    return;

  // ✅ ALWAYS show turn once both names exist
  let currentName = currentPlayer === "X" ? playerXName : playerOName;

  document.getElementById("status").textContent = currentName + " Turn";
}

  document.getElementById("popupMessage").textContent =
    winnerName + " Wins!";

  document.getElementById("winPopup").classList.add("show");

}

  for(let i of c){

}
